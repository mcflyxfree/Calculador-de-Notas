<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Promedio</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 30px auto; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
        h2 { text-align: center; color: #2c3e50; }
        form { display: flex; flex-direction: column; gap: 10px; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px; background-color: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        .resultado-box { margin-top: 15px; text-align: center; font-size: 1.1em; }
        .aprobado { color: #27ae60; font-weight: bold; }
        .reprobado { color: #c0392b; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Calculadora de Promedio</h2>

    <form id="calcForm">
        <label>Nota 1: <input type="number" step="any" id="n1" placeholder="0 - 20" required></label>
        <label>Nota 2: <input type="number" step="any" id="n2" placeholder="0 - 20" required></label>
        <label>Nota 3: <input type="number" step="any" id="n3" placeholder="0 - 20" required></label>
        
        <button type="button" onclick="calcular()">Calcular Promedio</button>
    </form>

    <div class="resultado-box">
        <h3>Promedio: <span id="resultado">0.00</span></h3>
        <p id="estado"></p>
    </div>

    <script>
        function calcular() {
            let n1 = parseFloat(document.getElementById('n1').value) || 0;
            let n2 = parseFloat(document.getElementById('n2').value) || 0;
            let n3 = parseFloat(document.getElementById('n3').value) || 0;

            let promedio = (n1 + n2 + n3) / 3;
            document.getElementById('resultado').textContent = promedio.toFixed(2);

            let estadoEl = document.getElementById('estado');
            if (promedio >= 10) {
                estadoEl.textContent = "¡Aprobado! 🎉";
                estadoEl.className = "aprobado";
            } else {
                estadoEl.textContent = "Reprobado 😞";
                estadoEl.className = "reprobado";
            }
        }
    </script>

</body>
</html>
